<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Apgo">
  <title>Apgo</title>
  <!-- Square nameplate mark: warm-paper field, ink letter A, double rule,
       brand-red accent period. currentColor not used here so it reads on
       any browser chrome; warm-paper + ink mirror the canonical light theme. -->
  <rect width="64" height="64" rx="0" fill="#F7F4EC"/>

  <!-- top hairline -->
  <rect x="8" y="11" width="48" height="2" fill="#1A1714"/>

  <!-- serif "A" monogram -->
  <path d="M16 47 L29 17 L35 17 L48 47 L40.4 47 L37 38.6 L26.6 38.6 L23.2 47 Z M28.4 32.2 L35.2 32.2 L31.8 23.4 Z" fill="#1A1714"/>

  <!-- accent period -->
  <circle cx="44.5" cy="44" r="3.4" fill="#A6192E"/>

  <!-- signature heavy rule -->
  <rect x="8" y="51" width="48" height="3.5" fill="#1A1714"/>
</svg>
