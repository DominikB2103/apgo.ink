<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
<title id="title">Layered editorial research atlas</title>
<desc id="desc">Abstract topographic paper layers and measured color fields.</desc>
<defs>
  <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#efe5cf"/>
    <stop offset=".36" stop-color="#c8d5d0"/>
    <stop offset=".70" stop-color="#e6b08d"/>
    <stop offset="1" stop-color="#38483b"/>
  </linearGradient>
  <radialGradient id="r" cx="70%" cy="24%" r="68%">
    <stop offset="0" stop-color="#f8e1b9" stop-opacity=".95"/>
    <stop offset=".42" stop-color="#b96b48" stop-opacity=".55"/>
    <stop offset="1" stop-color="#161a13" stop-opacity="0"/>
  </radialGradient>
  <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 .18"/>
    </feComponentTransfer>
  </filter>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
</defs>
