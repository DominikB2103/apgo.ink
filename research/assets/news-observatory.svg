<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Observatory horizon</title>
<desc id="desc">Abstract observatory dome under a muted dusk sky.</desc>
<defs>
