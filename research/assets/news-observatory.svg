<radialGradient id="sun" cx="72%" cy="27%" r="45%"><stop offset="0" stop-color="#f4c27a" stop-opacity=".9"/><stop offset=".45" stop-color="#c97851" stop-opacity=".3"/><stop offset="1" stop-color="#c97851" stop-opacity="0"/></radialGradient>
<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .12"/></feComponentTransfer></filter>
